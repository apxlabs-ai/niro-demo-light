# Niro project configuration. Uncomment any field to override its default.

# container:
#   runtime: auto                # default; one of: auto, docker, podman, nerdctl.
#                                # auto detects in order: docker, podman, nerdctl.
#   max_memory: 512m             # string (e.g. 512m, 2g) — container memory cap.
#   max_cpu: 2                   # number (0.1–32) — container vCPU cap.
#   idle_timeout_minutes: 240    # default (4h); integer > 0. How long
#                                # niro-agent (the process inside the
#                                # container) waits with zero active MCP
#                                # requests before self-exiting. Sized to
#                                # absorb a dev's lunch + meetings without
#                                # losing pentest state — niro-agent holds
#                                # test cases / creds / assumptions in
#                                # process memory; an exit drops them and
#                                # append/verify/dispute would spin a
#                                # fresh, empty container. close_pentest
#                                # is the explicit shutdown (immediate,
#                                # host-side docker stop); this knob only
#                                # governs the never-coming-back case.

limits:
  max_budget_usd: 20
  max_duration_minutes: 30
  max_test_case_duration_minutes: 10  # raised from 5 — ownership-cross-check steps need more time on a fresh DB.

# min_severity: medium           # default; one of: critical, high, medium, low.
#                                # findings below this floor are not reported and
#                                # not tested (saves cost — fewer test cases run).

# log_level: info                # default; one of: debug, info, warn, error.
