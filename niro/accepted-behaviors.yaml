accepted_behaviors:
  - consequence: "POST /auth/login applies no rate limit or lockout, so an attacker who knows a valid email can send unlimited wrong-password attempts (all return 401, only bcrypt slows them) and run dictionary or credential-stuffing attacks against any account. Reproduced live: 60 wrong-password attempts against an account returned {401: 60} with no 429/lockout. UNCERTAINTY: rate-limiting is conventionally enforced at the edge (API gateway / WAF / CDN), and this repo contains no deployment or edge config, so whether the real production deployment already throttles login at the edge cannot be confirmed from here — the human must judge this against their actual prod fronting."
    evidence: "app/routes/auth.py:29-37 login handler has no attempt counter/cooldown/lockout; app/main.py:11-14 registers no rate-limiting middleware; requirements.txt has no slowapi/limiter dependency; repo has no Dockerfile/nginx/gateway/WAF/terraform config (start.sh runs uvicorn directly), so prod edge throttling can neither be confirmed nor ruled out."

  - consequence: "GET /mtls/tickets/{ticket_id} answers a cert-authenticated customer with 403 'access denied' when the ticket exists but belongs to another customer, versus 404 'ticket not found' when no such ticket exists. A customer (e.g. alex) can therefore enumerate which ticket IDs exist across all customers by scanning the 403-vs-404 status code, learning ticket existence and rough volume — but NOT any ticket content (the body is only the generic detail string; the cross-owner read itself stays blocked). Reproduced live on https://127.0.0.1:8443 as alex (customer A, id 2): own ticket 1 -> 200; blair's ticket 2 -> 403 'access denied'; ticket 99999 -> 404 'ticket not found'. Low-severity existence/info-leak oracle, no data disclosure. NOTE: this is the mTLS twin of the same root cause on the :8000 route GET /tickets/{ticket_id} (TC-1743FB64)."
    evidence: "app/routes/mtls.py:51-55 checks existence first (db.get None -> 404) then ownership (customer_id != user.id -> 403), so the two cases get distinct status codes. INTENT CLUE: tests/test_mtls.py:291-307 test_mtls_ticket_by_id_cross_user_returns_403 explicitly asserts the cross-owner case must return 403 ('cross-user ticket access must be 403') and instructs 'Do NOT fix this test — fix the route' — a committed test pinning 403 for an existing cross-owner ticket, which a fix to a uniform 404 (the invariant this finding wants) would break. The repo's intent is BOLA prevention (no 200 content leak), with 403 as the canonical access-denied response; whether to additionally collapse 403/404 to defeat enumeration is a judgment call left to the human."
    reason: ""
